<po-dynamic-form
  #dynamicForm
  [p-fields]="poFields"
  [p-value]="formValue">
</po-dynamic-form>

<div class="po-mt-3">
  <po-button
    p-label="Salvar"
    p-kind="primary"
    (p-click)="onSave()">
  </po-button>
  <po-button
    p-label="Cancelar"
    p-kind="secondary"
    (p-click)="onCancel()">
  </po-button>
</div>
